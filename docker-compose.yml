version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    restart: unless-stopped
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer.userlist.txt.example:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U crm_user || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.asgi:application -c gunicorn.conf.py"
    volumes:
      - ./crm_backend:/app
      - media_data:/app/media
      - staticfiles:/app/staticfiles
      - backup_data:/app/backups
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://crm_user:changeme@pgbouncer:6432/crm_db
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNELS_URL: redis://redis:6379/2
      REDIS_CACHE_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ADMIN_URL: ${ADMIN_URL:-admin/}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./crm_backend:/app
      - media_data:/app/media
      - backup_data:/app/backups
    environment:
      DATABASE_URL: postgresql://crm_user:changeme@pgbouncer:6432/crm_db
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNELS_URL: redis://redis:6379/2
      REDIS_CACHE_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./crm_backend:/app
      - backup_data:/app/backups
    environment:
      DATABASE_URL: postgresql://crm_user:changeme@pgbouncer:6432/crm_db
      REDIS_URL: redis://redis:6379/0
      REDIS_CHANNELS_URL: redis://redis:6379/2
      REDIS_CACHE_URL: redis://redis:6379/1
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:changeme}
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - media_data:/app/media:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      web:
        condition: service_healthy
      flower:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  media_data:
  staticfiles:
  backup_data:
