target-version = "py312"
line-length = 119

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401"]
"config/settings/*" = ["F405", "F403"]
