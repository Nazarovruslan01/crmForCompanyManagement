name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: crm_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://crm_user:changeme@localhost:5432/crm_db
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: django-insecure-ci-only
      DEBUG: "True"
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff linter
        run: ruff check .

      - name: Run mypy
        run: mypy . --ignore-missing-imports

      - name: Run Django system checks
        run: python manage.py check --deploy --fail-level=ERROR

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run --noinput

      - name: Run tests
        run: pytest --no-migrations -v --tb=short

      - name: Run pip-audit
        run: pip-audit -r requirements/base.txt --ignore-vuln CVE-2026-42304

      - name: Run detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline --force-use-all-plugins
