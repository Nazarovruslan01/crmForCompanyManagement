[mypy]
python_version = 3.12
strict = true

# Django plugin — required for QuerySet, Model, manager type inference
plugins = mypy_django_plugin.main

# Show error codes for easier suppression when truly needed
show_error_codes = true
pretty = true

[mypy.plugins.django-stubs]
django_settings_module = config.settings.local

# Migrations are auto-generated — never annotate them
[mypy-*.migrations.*]
ignore_errors = true

# Test files and fixtures use pytest patterns incompatible with strict typing
[mypy-apps.*.tests.*]
ignore_errors = true

[mypy-conftest]
ignore_errors = true

# Django admin has complex typing that doesn't work well with strict mypy
[mypy-apps.*.admin]
ignore_errors = true

# DRF serializers and views have complex generic typing patterns
[mypy-apps.*.serializers]
ignore_errors = true

[mypy-apps.*.views]
ignore_errors = true

# Third-party packages without stubs
[mypy-celery.*]
ignore_missing_imports = true

[mypy-reportlab.*]
ignore_missing_imports = true
