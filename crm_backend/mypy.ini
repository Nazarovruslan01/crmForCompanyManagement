[mypy]
python_version = 3.12
strict = true

# Django plugin — required for QuerySet, Model, manager type inference
plugins = mypy_django_plugin.main

# Show error codes for easier suppression when truly needed
show_error_codes = true
pretty = true

# Optional dependencies (sentry-sdk, python-json-logger) are installed in CI
# but may be missing locally — suppress unused-ignore warnings globally
warn_unused_ignores = false

[mypy.plugins.django-stubs]
django_settings_module = config.settings.local

# Migrations are auto-generated — never annotate them
[mypy-*.migrations.*]
ignore_errors = true

# Test files and fixtures use pytest patterns incompatible with strict typing
[mypy-apps.*.tests.*]
ignore_errors = true

[mypy-common.tests.*]
ignore_errors = true

[mypy-core.tests.*]
ignore_errors = true

[mypy-conftest]
ignore_errors = true

# Django admin has complex typing that doesn't work well with strict mypy
[mypy-apps.*.admin]
ignore_errors = true

# DRF serializers and views have complex generic typing patterns
[mypy-apps.*.serializers]
ignore_errors = true

[mypy-apps.*.views]
ignore_errors = true

# Third-party packages without stubs
[mypy-celery]
ignore_missing_imports = true
ignore_errors = true

[mypy-reportlab.*]
ignore_missing_imports = true

[mypy-core.tasks]
ignore_errors = true

[mypy-config.celery]
ignore_errors = true

[mypy-celery.py]
ignore_errors = true

[mypy-requests.*]
ignore_missing_imports = true

[mypy-sentry_sdk.*]
ignore_missing_imports = true

[mypy-pythonjsonlogger.*]
ignore_missing_imports = true
