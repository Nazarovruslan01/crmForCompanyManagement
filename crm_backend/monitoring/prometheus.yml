global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Django app metrics — django_prometheus exposes these on /metrics
  - job_name: "crm-web"
    static_configs:
      - targets: ["web:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "crm-worker"
    static_configs:
      - targets: ["worker:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Optional exporters — uncomment when services are added to compose:
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  # - job_name: "postgres-exporter"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
  # - job_name: "redis-exporter"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
