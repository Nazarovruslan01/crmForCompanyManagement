name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt

      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt

      - name: Run ruff
        run: ruff check crm_backend/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt

      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt

      - name: Check Django system
        working-directory: crm_backend
        run: python manage.py check

      - name: Check migrations are up to date
        working-directory: crm_backend
        run: python manage.py migrate --check

      - name: Run tests
        working-directory: crm_backend
        run: pytest --cov=apps --cov-report=term-missing
