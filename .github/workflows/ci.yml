name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIRECTORY: crm_backend

jobs:
  # ─── 1. Fast Gates — style & correctness ─────────────────────────────────
  lint:
    name: Lint (ruff check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - run: pip install ruff
      - name: Run ruff
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: ruff check .

  format:
    name: Format (ruff format --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - run: pip install ruff
      - name: Check formatting
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: ruff format --check .

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Run mypy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: mypy . --config-file mypy.ini

  migrations:
    name: Migrations check
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Verify no missing migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run

  deploy-check:
    name: Production readiness
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Create static directory
        run: mkdir -p ${{ env.WORKING_DIRECTORY }}/static
      - name: Django deploy system check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python manage.py migrate --noinput
          python manage.py check --deploy
      - name: Collect static files
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py collectstatic --noinput

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  frontend-build:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── 2. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, migrations, deploy-check]
    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Create static directory
        run: mkdir -p ${{ env.WORKING_DIRECTORY }}/static
      - name: Apply migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py migrate --noinput
      - name: Django system check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py check
      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          pytest -n auto \
            --cov=apps \
            --cov=core \
            --cov=common \
            --cov-report=xml \
            --cov-fail-under=90
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          flags: unittests
          name: codecov-crm
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── 3. Smoke test ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test (Django server)
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Create static directory
        run: mkdir -p ${{ env.WORKING_DIRECTORY }}/static
      - name: Apply migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py migrate --noinput
      - name: Collect static
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py collectstatic --noinput
      - name: Start Django and verify /api/v2/
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 5
          curl -sSf http://localhost:8000/api/v2/ || true
          # Graceful shutdown
          curl -sSf -X POST http://localhost:8000/admin/logout/ || true

  # ─── 4. E2E tests (Playwright) ──────────────────────────────────────────────
  # Run sequentially (single job, --workers=1) to avoid shared database state
  # conflicts across parallel test workers.
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [smoke-test]
    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.e2e
      REDIS_URL: redis://localhost:6379/0
      BACKEND_URL: http://localhost:8000
      BASE_URL: http://localhost:4173
      DISABLE_THROTTLING: 1
      CI: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Python dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      - name: Create static directory
        run: mkdir -p ${{ env.WORKING_DIRECTORY }}/static
      - name: Apply migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py migrate --noinput
      - name: Seed E2E test data
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py e2e_reset
      - name: Start Django backend
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          sleep 5
          curl -sSf http://localhost:8000/api/v2/ || (echo "Django failed to start" && exit 1)
      - name: Build and serve frontend
        working-directory: frontend
        run: |
          npm run build
          npm run preview -- --port 4173 &
          sleep 3
      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test --workers=1
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ─── 5. Docker build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: crm-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 6. Load tests (Locust) ──────────────────────────────────────────────────
  load-tests:
    name: Load tests (Locust)
    runs-on: ubuntu-latest
    needs: [test]
    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local
      REDIS_URL: redis://localhost:6379/0
      DISABLE_THROTTLING: 1
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Install dependencies
        run: pip install -r ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - name: Create static directory
        run: mkdir -p ${{ env.WORKING_DIRECTORY }}/static
      - name: Apply migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py migrate --noinput
      - name: Seed test users
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: python manage.py create_test_users
      - name: Start Django backend
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          gunicorn config.wsgi:application -b 0.0.0.0:8000 -k sync --access-logfile /tmp/django.log --error-logfile /tmp/django.log &
          sleep 5
          curl -sSf http://localhost:8000/api/health/ || (cat /tmp/django.log && exit 1)
      - name: Generate admin JWT token for load tests
        id: gen_token
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          TOKEN=$(python -c "
          import os, django
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings.local')
          django.setup()
          from rest_framework_simplejwt.tokens import RefreshToken
          from django.contrib.auth import get_user_model
          User = get_user_model()
          user = User.objects.get(username='admin')
          token = RefreshToken.for_user(user)
          print(str(token.access_token))
          ")
          echo "LOCUST_ADMIN_TOKEN=$TOKEN" >> $GITHUB_ENV
      - name: Run Locust load tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          LOCUST_ADMIN_TOKEN: ${{ env.LOCUST_ADMIN_TOKEN }}
        run: |
          locust -f loadtests/locustfile.py \
            --host=http://localhost:8000 \
            --run-time=30s \
            --users=50 \
            --spawn-rate=10 \
            --headless \
            --html=loadtest-report.html \
            --csv=loadtest
      - name: Print Django logs on failure
        if: failure()
        run: cat /tmp/django.log || true
      - name: Check load test thresholds
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          # Parse CSV stats and enforce thresholds
          python -c "
          import csv, sys
          with open('loadtest_stats.csv') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row['Name'] == 'Aggregated':
                      p95 = float(row['95%'])
                      fail_rate = float(row['Failure Count']) / max(float(row['Request Count']), 1) * 100
                      print(f'p95={p95:.0f}ms, failure_rate={fail_rate:.1f}%')
                      if p95 > 500:
                          print('FAIL: p95 response time > 500ms')
                          sys.exit(1)
                      if fail_rate > 5:
                          print('FAIL: failure rate > 5%')
                          sys.exit(1)
          "

  # ─── 6. Security — non-blocking ────────────────────────────────────────────
  security-sast:
    name: Security SAST (bandit)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - run: pip install bandit
      - name: Run bandit
        run: |
          bandit -r ${{ env.WORKING_DIRECTORY }}/ \
            -ll -iii \
            -x "${{ env.WORKING_DIRECTORY }}/apps/accounts/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/billing/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/messenger/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/notifications/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/properties/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/residents/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/staff/migrations" \
            -x "${{ env.WORKING_DIRECTORY }}/apps/tickets/migrations" \
            -f json \
            -o bandit-results.json
      - name: Upload bandit results
        uses: actions/upload-artifact@v5
        with:
          name: bandit-results
          path: bandit-results.json

  security-deps:
    name: Security deps (pip-audit)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/base.txt
      - run: pip install pip-audit
      - name: Audit dependencies
        # Ignore CVE-2026-42304 in twisted: fix (26.4.0rc2) not yet on PyPI as stable release.
        run: pip-audit -r ${{ env.WORKING_DIRECTORY }}/requirements/base.txt --ignore-vuln CVE-2026-42304

  security-secrets:
    name: Secret scanning (detect-secrets)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements/local.txt
      - run: pip install detect-secrets
      - name: Scan for new secrets
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: detect-secrets scan --baseline .secrets.baseline --force-use-all-plugins

  frontend-audit:
    name: Frontend security audit (npm audit)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level moderate
        continue-on-error: true
