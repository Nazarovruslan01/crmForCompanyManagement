name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─── 1. Style & imports ───────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt

      - run: pip install ruff
      - name: Run ruff
        working-directory: crm_backend
        run: ruff check .

  # ─── 2. Static type checking ──────────────────────────────────────────────
  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt

      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt

      - name: Run mypy
        working-directory: crm_backend
        run: mypy . --config-file mypy.ini

  # ─── 3. Security — static analysis ───────────────────────────────────────
  security-sast:
    name: Security SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install bandit

      # -ll = block on MEDIUM and HIGH severity
      # -iii = block on MEDIUM and HIGH confidence
      - name: Run bandit
        run: |
          bandit -r crm_backend/ \
            -ll -iii \
            --exclude crm_backend/apps/*/migrations \
            -f txt

  # ─── 4. Security — dependency CVE scan ───────────────────────────────────
  security-deps:
    name: Security deps (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r crm_backend/requirements/base.txt

  # ─── 5. Tests — runs only when all checks pass ───────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security-sast, security-deps]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt

      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt

      - name: Create static directory
        run: mkdir -p crm_backend/static

      - name: Django system check
        working-directory: crm_backend
        run: python manage.py check

      - name: Run tests
        working-directory: crm_backend
        run: pytest --cov=apps --cov-report=term-missing
