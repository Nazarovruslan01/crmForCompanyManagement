name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─── 1. Fast Gates — style & correctness ─────────────────────────────────
  lint:
    name: Lint (ruff check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - run: pip install ruff
      - name: Run ruff
        working-directory: crm_backend
        run: ruff check .

  format:
    name: Format (ruff format --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - run: pip install ruff
      - name: Check formatting
        working-directory: crm_backend
        run: ruff format --check .

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt
      - name: Run mypy
        working-directory: crm_backend
        run: mypy . --config-file mypy.ini

  migrations:
    name: Migrations check
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt
      - name: Verify no missing migrations
        working-directory: crm_backend
        run: |
          python manage.py migrate --noinput
          python manage.py makemigrations --check --dry-run

  deploy-check:
    name: Production readiness
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt
      - name: Create static directory
        run: mkdir -p crm_backend/static
      - name: Django deploy system check
        working-directory: crm_backend
        run: |
          python manage.py migrate --noinput
          python manage.py check --deploy

  # ─── 2. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, migrations, deploy-check]
    env:
      DATABASE_URL: postgresql://crm_user:crm_password@localhost:5432/crm_test
      DJANGO_SETTINGS_MODULE: config.settings.local
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crm_test
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user -d crm_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - name: Install dependencies
        run: pip install -r crm_backend/requirements/local.txt
      - name: Create static directory
        run: mkdir -p crm_backend/static
      - name: Apply migrations
        working-directory: crm_backend
        run: python manage.py migrate --noinput
      - name: Django system check
        working-directory: crm_backend
        run: python manage.py check
      - name: Run tests
        working-directory: crm_backend
        run: |
          pytest -n auto \
            --cov=apps \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─── 3. Security — non-blocking ────────────────────────────────────────────
  security-sast:
    name: Security SAST (bandit)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - run: pip install bandit
      - name: Run bandit
        run: |
          bandit -r crm_backend/ \
            -ll -iii \
            -x "crm_backend/apps/accounts/migrations" \
            -x "crm_backend/apps/billing/migrations" \
            -x "crm_backend/apps/notifications/migrations" \
            -x "crm_backend/apps/properties/migrations" \
            -x "crm_backend/apps/residents/migrations" \
            -x "crm_backend/apps/staff/migrations" \
            -x "crm_backend/apps/tickets/migrations" \
            -f txt

  security-deps:
    name: Security deps (pip-audit)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/base.txt
      - run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r crm_backend/requirements/base.txt

  security-secrets:
    name: Secret scanning (detect-secrets)
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crm_backend/requirements/local.txt
      - run: pip install detect-secrets
      - name: Scan for new secrets
        working-directory: crm_backend
        run: detect-secrets scan --baseline .secrets.baseline --force-use-all-plugins
