# Pre-commit hooks for CRM backend
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  # ─── General file hygiene ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # ─── Ruff (lint + format) ───────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        name: ruff check
        args: [--fix, --exit-non-zero-on-fix]
        files: ^crm_backend/
      - id: ruff-format
        name: ruff format
        files: ^crm_backend/

  # ─── Security ──────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: bandit security scan
        args:
          - -ll
          - -iii
          - -f
          - txt
        exclude: |
          (?x)^(
            crm_backend/apps/.*/migrations/.*
          )$

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets scan
        args:
          - --baseline
          - crm_backend/.secrets.baseline
        exclude: |
          (?x)^(
            crm_backend/.secrets.baseline
          )$

  # ─── Type checking ───────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: mypy
        language: system
        types: [python]
        files: ^crm_backend/
        args: [--config-file, crm_backend/mypy.ini]
        pass_filenames: false
